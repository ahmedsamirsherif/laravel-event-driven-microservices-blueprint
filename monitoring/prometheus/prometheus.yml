global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: 'hr-service'
    metrics_path: /api/metrics
    static_configs:
      - targets: ['hr-service:80']
        labels:
          service: 'hr-service'

  - job_name: 'hub-service'
    metrics_path: /api/metrics
    static_configs:
      - targets: ['hub-service:80']
        labels:
          service: 'hub-service'

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
        labels:
          service: 'rabbitmq'
